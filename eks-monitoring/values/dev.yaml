# values/dev.yaml
# Development environment values for eks-monitoring stack

kube-prometheus-stack:
  enabled: true

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

      # Scrape all ServiceMonitors in all namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

      # Additional scrape config for nginx app
      additionalScrapeConfigs:
        - job_name: "nginx-app"
          static_configs:
            - targets: ["nginx-service.default.svc.cluster.local:9113"]
          metrics_path: /metrics

      # SLO recording rules
      additionalRuleGroups:
        - name: slo.nginx
          interval: 30s
          rules:
            # Rate of successful requests (non-5xx)
            - record: job:nginx_http_requests:success_rate5m
              expr: |
                1 - (
                  rate(nginx_http_requests_total{status=~"5.."}[5m])
                  /
                  rate(nginx_http_requests_total[5m])
                )

            # Error budget remaining (target 99.9%)
            - record: job:nginx_http_requests:error_budget_remaining
              expr: |
                1 - (
                  (1 - job:nginx_http_requests:success_rate5m)
                  / (1 - 0.999)
                )

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    enabled: true

    # Admin credentials from AWS Secrets Manager (injected at deploy time)
    # Never hardcode here — see deploy workflow
    adminUser: ""
    adminPassword: ""

    grafana.ini:
      server:
        domain: grafana-extra-migration-dev.YOUR_DOMAIN_HERE
        root_url: "https://grafana-extra-migration-dev.YOUR_DOMAIN_HERE"
      auth:
        disable_login_form: false
      security:
        allow_embedding: false

    # Dashboards provisioned from configmaps
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "default"
            orgId: 1
            folder: ""
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/default

    dashboardsConfigMaps:
      default: "grafana-dashboards"

    # Data sources
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-operated:9090
            isDefault: true
            access: proxy

          - name: CloudWatch
            type: cloudwatch
            access: proxy
            jsonData:
              authType: default  # uses IRSA — no keys committed
              defaultRegion: us-east-1

    # Ingress with IP allowlist
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/whitelist-source-range: "YOUR_HOME_IP/32"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: grafana-basic-auth
      hosts:
        - grafana-extra-migration-dev.YOUR_DOMAIN_HERE
      tls: []  # add once cert-manager lands

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi

    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["alertname", "job"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
      receivers:
        - name: "null"
      # Story 2.3 will add Slack routing here

  # ── Node Exporter ────────────────────────────────────────────────────────────
  nodeExporter:
    enabled: true

  # ── kube-state-metrics ───────────────────────────────────────────────────────
  kubeStateMetrics:
    enabled: true
