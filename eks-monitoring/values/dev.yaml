# values/dev.yaml
# Development environment — access via kubectl port-forward (no ingress/domain needed)

kube-prometheus-stack:
  enabled: true

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

      # Scrape all ServiceMonitors in all namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

      # Additional scrape config for nginx app
      additionalScrapeConfigs:
        - job_name: "nginx-app"
          static_configs:
            - targets: ["nginx-service.default.svc.cluster.local:9113"]
          metrics_path: /metrics

      # SLO recording rules
      additionalRuleGroups:
        - name: slo.nginx
          interval: 30s
          rules:
            - record: job:nginx_http_requests:success_rate5m
              expr: |
                1 - (
                  rate(nginx_http_requests_total{status=~"5.."}[5m])
                  /
                  rate(nginx_http_requests_total[5m])
                )
            - record: job:nginx_http_requests:error_budget_remaining
              expr: |
                1 - (
                  (1 - job:nginx_http_requests:success_rate5m)
                  / (1 - 0.999)
                )

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    enabled: true

    # Credentials from AWS Secrets Manager — injected at deploy time, never hardcoded
    adminUser: ""
    adminPassword: ""

    grafana.ini:
      server:
        root_url: "http://localhost:3000"
      auth:
        disable_login_form: false
      security:
        allow_embedding: false

    # Ingress disabled — use kubectl port-forward instead
    ingress:
      enabled: false

    # Dashboards provisioned from configmap (not hand-clicked)
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "default"
            orgId: 1
            folder: ""
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/default

    dashboardsConfigMaps:
      default: "grafana-dashboards"

    # Data sources
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-operated:9090
            isDefault: true
            access: proxy

          - name: CloudWatch
            type: cloudwatch
            access: proxy
            jsonData:
              authType: default  # uses IRSA — no keys committed
              defaultRegion: us-east-1

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi

    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["alertname", "job"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
      receivers:
        - name: "null"
      # Story 2.3 will layer Slack routing here

  # ── Node Exporter ────────────────────────────────────────────────────────────
  nodeExporter:
    enabled: true

  # ── kube-state-metrics ───────────────────────────────────────────────────────
  kubeStateMetrics:
    enabled: true
