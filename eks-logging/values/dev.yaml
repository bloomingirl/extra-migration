# values/dev.yaml
# Development environment — access via kubectl port-forward (no ingress/domain needed)

# ── Elasticsearch ─────────────────────────────────────────────────────────────
elasticsearch:
  replicas: 1
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "8.13.4"

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  esJavaOpts: "-Xmx1g -Xms1g"

  extraEnvs:
    - name: discovery.type
      value: single-node
    - name: xpack.security.enabled
      value: "true"
    - name: xpack.security.http.ssl.enabled
      value: "false"

  persistence:
    enabled: true
    storageClass: gp2
    size: 30Gi

# ── Fluent Bit ────────────────────────────────────────────────────────────────
fluentbit:
  image:
    repository: fluent/fluent-bit
    tag: "3.1.4"

  tolerations:
    - operator: Exists

  s3:
    bucket: extra-migration-dev-logs
    region: us-east-1
    roleArn: ""   # paste output of: terraform output fluentbit_s3_role_arn

  config:
    service: |
      [SERVICE]
          Flush        5
          Daemon       Off
          Log_Level    info
          HTTP_Server  On
          HTTP_Listen  0.0.0.0
          HTTP_Port    2020

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          Parser            docker
          Tag               kube.*
          Refresh_Interval  5
          Mem_Buf_Limit     50MB
          Skip_Long_Lines   On

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude On

    outputs: |
      [OUTPUT]
          Name            es
          Match           kube.*
          Host            elasticsearch.logging.svc.cluster.local
          Port            9200
          HTTP_User       ${ELASTICSEARCH_USER}
          HTTP_Passwd     ${ELASTICSEARCH_PASSWORD}
          Index           fluent-bit
          Type            _doc
          tls             Off
          Retry_Limit     5

      [OUTPUT]
          Name                         s3
          Match                        kube.*
          bucket                       extra-migration-dev-logs
          region                       us-east-1
          total_file_size              50M
          upload_timeout               10m
          use_put_object               On
          compression                  gzip
          s3_key_format                /logs/%Y/%m/%d/%H/$TAG[4]_%H%M%S

# ── Kibana ────────────────────────────────────────────────────────────────────
kibana:
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: "8.13.4"

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Ingress disabled — use kubectl port-forward instead
  ingress:
    enabled: false
